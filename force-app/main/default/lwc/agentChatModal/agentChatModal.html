<template>
    <div class="backdrop" onclick={handleClose}></div>

    <div class={sheetClass} role="dialog" aria-label="Field Assistant chat">

        <!-- Header -->
        <div class="sheet-header">
            <div class="sheet-icon">FA</div>
            <div class="sheet-title-block">
                <div class="sheet-name">{agentName}</div>
                <div class={statusClass}>
                    <span class="status-dot"></span>
                    {statusLabel}
                </div>
            </div>

            <div class="header-actions">
                <button class="header-btn"
                        onclick={handleToggleFullScreen}
                        title={fullScreenTitle}>
                    <template lwc:if={isFullScreen}>
                        <!-- Collapse icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="4 14 10 14 10 20"/>
                            <polyline points="20 10 14 10 14 4"/>
                            <line x1="14" y1="10" x2="21" y2="3"/>
                            <line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </template>
                    <template lwc:else>
                        <!-- Expand icon -->
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"/>
                            <polyline points="9 21 3 21 3 15"/>
                            <line x1="21" y1="3" x2="14" y2="10"/>
                            <line x1="3" y1="21" x2="10" y2="14"/>
                        </svg>
                    </template>
                </button>

                <button class="header-btn sheet-close"
                        onclick={handleClose}
                        title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages list -->
        <div class="sheet-msgs" lwc:ref="msgsContainer">
            <template for:each={messages} for:item="msg">
                <c-agent-message
                    key={msg.id}
                    message={msg}
                    user-name={userName}
                    agent-name={agentName}
                    is-locked={isLoading}
                    onoptionselected={handleOptionSelected}>
                </c-agent-message>
            </template>
        </div>

        <!-- Input bar -->
        <div class="sheet-input">
            <input
                type="text"
                class="input-box"
                placeholder="Type your reply..."
                value={inputText}
                onkeyup={handleInputKeyUp}
                oninput={handleInputChange}
                disabled={isLoading}
                lwc:ref="inputField" />

            <button class="mic-btn"
                    onclick={handleMicClick}
                    disabled={isLoading}
                    title="Voice input">
                <template lwc:if={isListening}>
                    <span class="mic-pulse"></span>
                </template>
                <svg class="mic-svg" viewBox="0 0 24 24" fill="none">
                    <rect x="9" y="2" width="6" height="12" rx="3" fill="currentColor"/>
                    <path d="M5 11a7 7 0 0014 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>

            <button class="send-btn"
                    onclick={handleSend}
                    disabled={isSendDisabled}
                    title="Send">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none">
                    <path d="M3 12l18-9-9 18-2-7-7-2z" fill="white"/>
                </svg>
            </button>
        </div>
    </div>
</template>
